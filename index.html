    <script>
        (function() {
            // Находим все секции внутри контейнера (кроме первой)
            const sections = document.querySelectorAll('.sections-with-bg section');
            const footer = document.querySelector('footer');
            
            // Проверяем, есть ли поддержка Intersection Observer
            if (!window.IntersectionObserver) {
                // fallback: показываем всё сразу, если браузер старый
                sections.forEach(section => {
                    section.classList.add('revealed');
                });
                return;
            }
            
            // Настройки наблюдателя: когда элемент появляется в области видимости
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('revealed');
                        // После появления можно продолжить наблюдать (на случай, если нужно)
                        // Но можно и отключить наблюдение за этим элементом:
                        observer.unobserve(entry.target);
                    }
                });
            }, {
                threshold: 0.15,      // когда 15% секции показалось — запускаем анимацию
                rootMargin: '0px 0px -30px 0px'  // небольшой отрицательный отступ снизу
            });
            
            // Начинаем наблюдать за каждой секцией
            sections.forEach(section => {
                observer.observe(section);
            });
            
            // Футер тоже с анимацией (появляется, когда доскроллили до него)
            if (footer) {
                observer.observe(footer);
            }
            
            // Для красоты: если пользователь уже прокрутил страницу до какой-то секции
            // (например, при перезагрузке), проверяем видимость вручную
            setTimeout(() => {
                sections.forEach(section => {
                    const rect = section.getBoundingClientRect();
                    const windowHeight = window.innerHeight;
                    if (rect.top < windowHeight - 100) {
                        section.classList.add('revealed');
                        observer.unobserve(section);
                    }
                });
                if (footer) {
                    const footerRect = footer.getBoundingClientRect();
                    if (footerRect.top < window.innerHeight - 100) {
                        footer.classList.add('revealed');
                        observer.unobserve(footer);
                    }
                }
            }, 200);
            
            console.log('✨ Анимация при скролле активирована! Секции будут появляться плавно.');
        })();
    </script>

                <!-- Конфетти (красивые и медленные) -->
<script>
    (function() {
        console.log('Скрипт конфетти загружен');
        
        let confettiShown = false;
        
        function shootConfetti() {
            console.log('ЗАПУСКАЕМ КОНФЕТТИ! 🎉');
            
            const colors = ['#ffb3ba', '#c7e9fb', '#fdfd97', '#b5ead7', '#ffdac1', '#ff9aa2', '#ffd1dc', '#d4f1f9', '#e6c8a0'];
            
            // Создаём 180 конфетти, которые падают сверху
            for (let i = 0; i < 180; i++) {
                const confetti = document.createElement('div');
                
                // Случайные размеры (от 4 до 14 пикселей)
                const size = Math.random() * 10 + 4;
                // Случайная горизонтальная позиция (от левого до правого края)
                const startX = Math.random() * window.innerWidth;
                // Случайная задержка перед началом падения (чтобы не все сразу)
                const delay = Math.random() * 800;
                // Скорость падения (от 3 до 7 секунд)
                const duration = Math.random() * 4 + 3;
                // Смещение в сторону при падении
                const driftX = (Math.random() - 0.5) * 250;
                
                confetti.style.position = 'fixed';
                confetti.style.left = startX + 'px';
                confetti.style.top = '-20px';
                confetti.style.width = size + 'px';
                confetti.style.height = size + 'px';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
                confetti.style.zIndex = '99999';
                confetti.style.pointerEvents = 'none';
                confetti.style.opacity = '0.9';
                confetti.style.transition = 'none';
                document.body.appendChild(confetti);
                
                // Запускаем падение с задержкой
                setTimeout(() => {
                    confetti.style.transition = `all ${duration}s cubic-bezier(0.4, 0.8, 0.5, 1)`;
                    confetti.style.transform = `translate(${driftX}px, ${window.innerHeight + 100}px) rotate(${Math.random() * 720}deg)`;
                    confetti.style.opacity = '0';
                }, delay);
                
                // Удаляем после падения
                setTimeout(() => {
                    if (confetti.parentNode) confetti.remove();
                }, delay + duration * 1000 + 500);
            }
        }
        
        function initConfetti() {
            const secondSection = document.querySelector('.two');
            console.log('Секция .two найдена?', secondSection);
            
            if (!secondSection) {
                setTimeout(initConfetti, 500);
                return;
            }
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting && !confettiShown) {
                        confettiShown = true;
                        shootConfetti();
                    }
                });
            }, { threshold: 0.3 });
            
            observer.observe(secondSection);
            console.log('Наблюдение за .two запущено');
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initConfetti);
        } else {
            initConfetti();
        }
    })();
</script>

<style>
    .preloader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #EED5B9;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 999999;
        transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    
    .preloader.hide {
        opacity: 0;
        visibility: hidden;
    }
    
    /* Вариант 2 - надпись с точками */
    .preloader-text {
        font-size: 1.3rem;
        color: #8B7A6B;
        font-weight: 400;
        letter-spacing: 2px;
        margin-bottom: 25px;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    
    .dots {
        display: inline-block;
        width: 45px;
        text-align: left;
    }
    
    /* Анимация для точек */
    .dot {
        display: inline-block;
        animation: bounce 1.4s infinite;
    }
    .dot:nth-child(1) { animation-delay: 0s; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    
    @keyframes bounce {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
        30% { transform: translateY(-8px); opacity: 1; }
    }
    
    /* Вариант 3 - мерцающий бантик */
    .preloader-bow {
        width: 60px;
        height: 60px;
        background-image: url('image/бантглавнлев.svg');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        animation: glow 1.2s ease-in-out infinite;
        margin-bottom: 20px;
    }
    
    @keyframes glow {
        0%, 100% { 
            opacity: 0.4;
            transform: scale(0.9);
        }
        50% { 
            opacity: 1;
            transform: scale(1.1);
        }
    }
    
    /* Маленькая подпись под бантиком */
    .preloader-sub {
        font-size: 0.8rem;
        color: #B8A088;
        margin-top: 10px;
    }
</style>

<div class="preloader" id="preloader">
    <!-- Сначала показываем вариант 3 (бантик) -->
    <div id="bowVersion" style="display: flex; flex-direction: column; align-items: center;">
        <div class="preloader-bow"></div>
        <div class="preloader-sub">загружаем...</div>
    </div>
    
    <!-- А потом показываем вариант 2 (надпись) - изначально скрыт -->
    <div id="textVersion" style="display: none; flex-direction: column; align-items: center;">
        <div class="preloader-text">
            Загружаем приглашение
            <span class="dots">
                <span class="dot">●</span>
                <span class="dot">●</span>
                <span class="dot">●</span>
            </span>
        </div>
        <div class="preloader-bow" style="width: 40px; height: 40px;"></div>
    </div>
</div>

<script>
    (function() {
        const preloader = document.getElementById('preloader');
        const bowVersion = document.getElementById('bowVersion');
        const textVersion = document.getElementById('textVersion');
        
        let imagesLoaded = false;
        let timerExpired = false;
        
        // Сначала показываем бантик на 1.2 секунды
        setTimeout(() => {
            if (!imagesLoaded) {
                // Плавно меняем с бантика на надпись
                bowVersion.style.transition = 'opacity 0.4s';
                textVersion.style.transition = 'opacity 0.4s';
                
                bowVersion.style.opacity = '0';
                setTimeout(() => {
                    bowVersion.style.display = 'none';
                    textVersion.style.display = 'flex';
                    textVersion.style.opacity = '0';
                    setTimeout(() => {
                        textVersion.style.opacity = '1';
                    }, 10);
                }, 400);
            }
        }, 1200);
        
        // Считаем все картинки на странице
        const allImages = document.querySelectorAll('img');
        let loadedCount = 0;
        const totalImages = allImages.length;
        
        function checkAllLoaded() {
            loadedCount++;
            if (loadedCount >= totalImages) {
                imagesLoaded = true;
                // Ждём ещё немного для плавности, потом скрываем прелоадер
                setTimeout(() => {
                    preloader.classList.add('hide');
                    setTimeout(() => {
                        if (preloader.parentNode) preloader.remove();
                    }, 600);
                }, 500);
            }
        }
        
        // Если картинок нет, просто скрываем через 2 секунды
        if (totalImages === 0) {
            setTimeout(() => {
                preloader.classList.add('hide');
                setTimeout(() => preloader.remove(), 600);
            }, 2000);
        } else {
            // Для каждой картинки проверяем загрузку
            allImages.forEach(img => {
                if (img.complete) {
                    checkAllLoaded();
                } else {
                    img.addEventListener('load', checkAllLoaded);
                    img.addEventListener('error', checkAllLoaded); // даже если ошибка, всё равно считаем
                }
            });
        }
        
        // Запасной таймер на 4 секунды (на всякий случай)
        setTimeout(() => {
            if (!imagesLoaded) {
                imagesLoaded = true;
                preloader.classList.add('hide');
                setTimeout(() => {
                    if (preloader.parentNode) preloader.remove();
                }, 600);
            }
        }, 4000);
    })();
</script>
